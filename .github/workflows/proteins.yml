name: PROTEINS Experiment - QGCN Graph Classification

on:
  push:
    branches: [main]
    paths:
      - 'src/train_proteins.py'
      - 'src/data/load_proteins.py'
      - 'src/models/**'
      - '.github/workflows/proteins.yml'
  workflow_dispatch:

jobs:
  proteins:
    runs-on: [A6000]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add npm global bin to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Set CUDA library path
        run: |
          CUDA_LIB=$(find /usr/local/cuda* /usr/lib/x86_64-linux-gnu -name "libcudnn.so*" \
            -exec dirname {} \; 2>/dev/null | head -1)
          if [ -n "$CUDA_LIB" ]; then
            echo "LD_LIBRARY_PATH=${CUDA_LIB}:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
            echo "Found cuDNN at: $CUDA_LIB"
          else
            echo "Warning: cuDNN not found, CUDA may not work"
          fi

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Cache HuggingFace datasets
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface/datasets
          key: hf-datasets-proteins-v1
          restore-keys: |
            hf-datasets-proteins-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip3 install torch-geometric datasets
          pip3 install scikit-learn numpy matplotlib pandas
          pip3 install pennylane pennylane-lightning

      - name: Verify environment
        run: |
          python3 - << 'PYEOF'
          import torch
          import torch_geometric
          import pennylane as qml
          from datasets import load_dataset
          print(f"PyTorch: {torch.__version__}")
          print(f"PyG: {torch_geometric.__version__}")
          print(f"PennyLane: {qml.__version__}")
          print(f"CUDA: {torch.cuda.is_available()}")
          print("Imports OK")
          PYEOF

      - name: Run PROTEINS experiment
        run: |
          cd src && python3 train_proteins.py

      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml ci

          python3 - << 'PYEOF' > report.md
          import json, os
          metrics_path = 'proteins_metrics.json'
          with open(metrics_path) as f:
              m = json.load(f)

          hp = m.get('hyperparameters', {})
          lines = []
          lines.append('# PROTEINS Experiment Report — QGCN Graph Classification')
          lines.append('')
          lines.append(f"**Timestamp:** {m['timestamp']}")
          lines.append(f"**Model:** {m['model']}")
          lines.append(f"**Protocol:** {m['n_folds']}-fold stratified cross-validation")
          lines.append('')

          lines.append('## Dataset')
          lines.append('')
          lines.append('| Property | Value |')
          lines.append('|----------|-------|')
          lines.append(f"| Name | {m['dataset']} |")
          lines.append(f"| Source | [{m['dataset_source']}](https://huggingface.co/datasets/{m['dataset_source']}) |")
          lines.append(f"| Graphs | {m['n_graphs']} |")
          lines.append(f"| Classes | {m['n_classes']} |")
          lines.append(f"| Node feature dim | {m['node_feature_dim']} |")
          lines.append(f"| Task | {m['task']} |")
          lines.append(f"| Cache | `~/.cache/huggingface/datasets` (downloaded once, reused) |")
          lines.append('')

          lines.append('## Hyperparameters')
          lines.append('')
          lines.append('| Parameter | Value |')
          lines.append('|-----------|-------|')
          lines.append(f"| Epochs (max) | {hp.get('epochs', '—')} |")
          lines.append(f"| Learning rate | {hp.get('learning_rate', '—')} |")
          lines.append(f"| Batch size | {hp.get('batch_size', '—')} |")
          lines.append(f"| Quantum circuit depths | {hp.get('q_depths', '—')} |")
          lines.append(f"| Early stop patience | {hp.get('early_stop_patience', '—')} folds |")
          lines.append(f"| Val frequency | every {hp.get('val_frequency', '—')} epochs |")
          lines.append(f"| Optimizer | {hp.get('optimizer', '—')} |")
          lines.append(f"| Loss | {hp.get('loss', '—')} |")
          lines.append(f"| Activation | {hp.get('activation', '—')} |")
          lines.append(f"| Random seed | {hp.get('random_seed', '—')} |")
          lines.append('')

          lines.append('## Summary')
          lines.append('')
          lines.append('| Metric | Mean | Std |')
          lines.append('|--------|:----:|:---:|')
          lines.append(f"| Accuracy | {m['mean_accuracy']:.4f} | {m['std_accuracy']:.4f} |")
          lines.append(f"| F1 Score | {m['mean_f1']:.4f} | — |")
          lines.append('')

          lines.append('## Per-Fold Results')
          lines.append('')
          lines.append('| Fold | Accuracy | F1 | Precision | Recall |')
          lines.append('|------|:--------:|:--:|:---------:|:------:|')
          for i, fold in enumerate(m['per_fold']):
              lines.append(f"| {i+1} | {fold['accuracy']:.4f} | {fold['f1']:.4f} | {fold['precision']:.4f} | {fold['recall']:.4f} |")
          lines.append('')
          print('\n'.join(lines))
          PYEOF

          if [ -f proteins_results.png ]; then
            echo "## Results Visualization" >> report.md
            echo "" >> report.md
            cml publish proteins_results.png --md >> report.md
          fi

          cml comment create report.md

      - name: Save artifacts
        if: always()
        run: |
          ARTIFACT_DIR="/tmp/proteins-${GITHUB_RUN_ID}"
          mkdir -p "$ARTIFACT_DIR"
          cp proteins_metrics.json "$ARTIFACT_DIR/" 2>/dev/null || true
          cp proteins_results.png "$ARTIFACT_DIR/" 2>/dev/null || true
          ls -lah "$ARTIFACT_DIR"
          echo "Artifacts: $ARTIFACT_DIR"

      - name: Commit metrics
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp proteins_metrics.json proteins_baseline.json
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git add proteins_baseline.json
          git commit -m "metrics: update PROTEINS baseline" || true
          git push origin HEAD:main || true
