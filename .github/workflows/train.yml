name: Q-Drop QGN Integration Training Pipeline

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: [A6000]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: System info
        run: |
          echo "=== Environment Check ==="
          uname -a
          python --version
          echo "Python arch: $(python -c 'import struct; print(struct.calcsize("P") * 8)')-bit"
          nvidia-smi || echo "GPU not detected"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (Linux x86_64)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install tensorflow numpy scipy matplotlib
          pip install pennylane pennylane-lightning scikit-learn

      - name: Verify environment
        run: |
          python - << 'PYEOF'
          import tensorflow as tf
          import pennylane as qml
          print(f"TensorFlow: {tf.__version__}")
          print(f"GPU Available: {len(tf.config.list_physical_devices('GPU')) > 0}")
          print(f"PennyLane: {qml.__version__}")
          print("Imports OK")
          PYEOF

      - name: Run training pipeline
        run: |
          cd src && python train_mnist.py

      - name: Generate metrics report
        run: |
          cat > report.md << 'EOF'
          # Q-Drop Training Results

          ## Metrics
          \`\`\`
          EOF
          python - << 'PYEOF' >> report.md
          import json
          with open('metrics.json') as f:
              m = json.load(f)
              for algo, metrics in m['algorithms'].items():
                  print(f'- **{algo}**: Accuracy={metrics["accuracy"]:.4f}, Loss={metrics["final_loss"]:.4f}')
          PYEOF
          echo '\`\`\`' >> report.md

      - name: Compare with baseline
        run: |
          if [ -f baseline.json ]; then
            python - << 'PYEOF'
          import json
          with open('metrics.json') as f:
              curr = json.load(f)
          with open('baseline.json') as f:
              base = json.load(f)
          best_curr = curr['best_accuracy']
          best_base = base['best_accuracy']
          delta = best_curr - best_base
          print(f'Baseline: {best_base:.4f}')
          print(f'Current:  {best_curr:.4f}')
          print(f'Delta:    {delta:+.4f}')
          if delta > 0:
              print('Improvement!')
          elif delta < -0.01:
              print('Regression!')
          else:
              print('Stable')
          PYEOF
          fi

      - uses: iterative/setup-cml@v1

      - name: Push metrics to PR
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat report.md > report_full.md
          echo "" >> report_full.md
          echo "## Plot" >> report_full.md
          if [ -f src/qd_hqgc_mnist_training.png ]; then
            cml-publish src/qd_hqgc_mnist_training.png -o >> report_full.md || echo "CML plot pub failed"
          fi
          cml-comment create report_full.md || echo "CML comment failed"

      - name: Save artifacts to temp folder
        if: always()
        run: |
          ARTIFACT_DIR="/tmp/q-drop-training-${GITHUB_RUN_ID}"
          mkdir -p "$ARTIFACT_DIR"
          cp metrics.json "$ARTIFACT_DIR/" 2>/dev/null || true
          cp baseline.json "$ARTIFACT_DIR/" 2>/dev/null || true
          cp src/qd_hqgc_mnist_training.png "$ARTIFACT_DIR/" 2>/dev/null || true
          ls -lah "$ARTIFACT_DIR"
          echo "Artifacts: $ARTIFACT_DIR"

      - name: Commit metrics (on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp ../metrics.json baseline.json
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git add baseline.json
          git commit -m "metrics: update baseline after training" || true
          git push origin HEAD:main || true
