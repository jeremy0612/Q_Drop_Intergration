name: Q-Drop QGN Integration Training Pipeline

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: [A6000]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Add npm global bin to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: System info
        run: |
          echo "=== Environment Check ==="
          uname -a
          python --version
          echo "Python arch: $(python -c 'import struct; print(struct.calcsize("P") * 8)')-bit"
          nvidia-smi || echo "GPU not detected"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (Linux x86_64)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install tensorflow numpy scipy matplotlib
          pip install pennylane pennylane-lightning scikit-learn

      - name: Verify environment
        run: |
          python - << 'PYEOF'
          import tensorflow as tf
          import pennylane as qml
          print(f"TensorFlow: {tf.__version__}")
          print(f"GPU Available: {len(tf.config.list_physical_devices('GPU')) > 0}")
          print(f"PennyLane: {qml.__version__}")
          print("Imports OK")
          PYEOF

      - name: Run training pipeline
        run: |
          cd src && python train_mnist.py

      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml ci

          # Build report
          python - << 'PYEOF' > report.md
          import json, sys
          with open('metrics.json') as f:
              m = json.load(f)

          lines = []
          lines.append('# Q-Drop + HQGC Training Report')
          lines.append('')
          lines.append(f"**Timestamp:** {m['timestamp']}")
          lines.append(f"**Best algorithm:** {m['best_algorithm']} ({m['best_accuracy']:.4f} accuracy)")
          lines.append('')
          lines.append('## Results by Algorithm')
          lines.append('')
          lines.append('| Algorithm | Val Accuracy | Final Val Loss |')
          lines.append('|-----------|:------------:|:--------------:|')
          for algo, metrics in m['algorithms'].items():
              lines.append(f"| {algo} | {metrics['final_val_accuracy']:.4f} | {metrics['final_val_loss']:.4f} |")
          lines.append('')

          # Baseline comparison
          try:
              with open('baseline.json') as f:
                  base = json.load(f)
              delta = m['best_accuracy'] - base['best_accuracy']
              sign = '+' if delta >= 0 else ''
              status = 'Improvement' if delta > 0 else ('Regression' if delta < -0.01 else 'Stable')
              lines.append('## Baseline Comparison')
              lines.append('')
              lines.append(f"| | Accuracy |")
              lines.append(f"|---|:---:|")
              lines.append(f"| Baseline ({base['best_algorithm']}) | {base['best_accuracy']:.4f} |")
              lines.append(f"| Current ({m['best_algorithm']}) | {m['best_accuracy']:.4f} |")
              lines.append(f"| Delta | {sign}{delta:.4f} |")
              lines.append(f"| Status | **{status}** |")
              lines.append('')
          except FileNotFoundError:
              lines.append('> No baseline found — first run.')
              lines.append('')

          print('\n'.join(lines))
          PYEOF

          # Embed training figure
          if [ -f src/qd_hqgc_mnist_training.png ]; then
            echo "## Training Curves & Algorithm Comparison" >> report.md
            echo "" >> report.md
            echo "![Training curves](./src/qd_hqgc_mnist_training.png)" >> report.md
          fi

          cml comment create report.md

      - name: Save artifacts to temp folder
        if: always()
        run: |
          ARTIFACT_DIR="/tmp/q-drop-training-${GITHUB_RUN_ID}"
          mkdir -p "$ARTIFACT_DIR"
          cp metrics.json "$ARTIFACT_DIR/" 2>/dev/null || true
          cp baseline.json "$ARTIFACT_DIR/" 2>/dev/null || true
          cp src/qd_hqgc_mnist_training.png "$ARTIFACT_DIR/" 2>/dev/null || true
          ls -lah "$ARTIFACT_DIR"
          echo "Artifacts: $ARTIFACT_DIR"

      - name: Commit metrics (on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp ../metrics.json baseline.json
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git add baseline.json
          git commit -m "metrics: update baseline after training" || true
          git push origin HEAD:main || true
